# Hyperparameters for standard training
# Used by scripts/train.py when --tune is NOT passed

# LoRA
r: 16
lora_alpha: 32

# Training
learning_rate: 2e-4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4    # effective batch = 16
num_train_epochs: 3
warmup_ratio: 0.03
lr_scheduler_type: cosine

# Optuna (only used with --tune)
optuna_trials: 5
optuna_epochs: 1
