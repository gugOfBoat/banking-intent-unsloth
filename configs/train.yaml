# ============================================================
# Training Configuration (Config-Driven Development)
# All parameters read by scripts/train.py — no hardcoding
# ============================================================

# ---- Model ----
model_name: "unsloth/Qwen3.5-4B"   # 4B fits T4 with load_in_4bit=True (~2.5GB VRAM)
max_seq_length: 512

# ---- LoRA ----
r: 16                          # LoRA rank (low-rank dimension)
lora_alpha: 32                 # LoRA scaling factor
lora_dropout: 0.05             # Dropout on LoRA layers
use_rslora: true               # Rank-Stabilized LoRA

# ---- Training ----
learning_rate: 2e-4            # Peak learning rate
per_device_train_batch_size: 4 # Batch size per GPU
gradient_accumulation_steps: 4 # Effective batch = 4 × 4 = 16
num_train_epochs: 3            # Total training epochs
warmup_ratio: 0.03             # Linear warmup fraction
lr_scheduler_type: cosine      # Cosine annealing schedule
optimizer: adamw_8bit          # 8-bit Adam (saves ~1.5 GB VRAM)

# ---- Quantization / Memory ----
load_in_4bit: true             # BitsAndBytes NF4 quantization
gradient_checkpointing: "unsloth"  # Extreme VRAM savings

# ---- Optuna HPO (only with --tune) ----
optuna_trials: 5               # Number of search trials
optuna_epochs: 1               # Epochs per trial (fast probing)
